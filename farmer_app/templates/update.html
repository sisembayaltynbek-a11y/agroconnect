{% extends "base.html" %}
{% load static %}

{% block page_title %}
<title>Update Product</title>
{% endblock %}

{% block content %}
<section id="update-product">
    <header>
        <h2>Update Product</h2>
        <p>Edit your product details below and click <strong>Save Changes</strong>.</p>
    </header>

    <form method="POST" enctype="multipart/form-data" class="update-form">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit" class="btn-save">💾 Save Changes</button>
    </form>
</section>

<section id="about">
    <h3>About</h3>
    <p>Phone number: +499900344 | Director: A.S.</p>
</section>
{% endblock %}
